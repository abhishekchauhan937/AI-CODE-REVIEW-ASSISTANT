<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Review Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="review-container">

        <!-- Dark Mode Button -->
        <button id="themeBtn" onclick="toggleTheme()">
            🌙 Dark Mode
        </button>

        <!-- Heading -->
        <h1>🤖 AI Code Review Assistant</h1>

        <p>
            Paste your code below and let AI analyze it for bugs,
            code quality, and improvement suggestions.
        </p>

        <!-- Language Selection -->
        <label><strong>Select Language</strong></label>

        <select>
            <option>JavaScript</option>
            <option>Python</option>
            <option>C</option>
            <option>C++</option>
            <option>Java</option>
            <option>HTML</option>
            <option>CSS</option>
        </select>

        <br><br>

        <!-- Code Editor -->
        <textarea
        rows="12"
        placeholder="Paste your code here..."
        oninput="updateStats()">
        </textarea>

        <div id="codeStats">
    Characters: <span id="charCount">0</span> |
    Lines: <span id="lineCount">0</span>
</div>

        <!-- Review Button -->
        <button id="reviewBtn" onclick="reviewCode()">Review Code</button>

        <button id="clearBtn" onclick="clearEditor()">Clear</button>

        <p class="shortcut-info">
    💡 Shortcuts:
    <strong>Ctrl + Enter</strong> = Review Code |
    <strong>Ctrl + Delete</strong> = Clear Editor</p>

        <br><br>

        <!-- AI Review Result -->
        <section class="result-container">

        <h2>AI Review Result</h2>
             
<button id="copyBtn" onclick="copyReview()">
    📋 Copy Review
</button>

<button id="downloadBtn" onclick="downloadReview()">
    💾 Download Report
</button>

            <div id="result">
                <p>Your AI feedback will appear here.</p>
            </div>

            <div class="history-section">
    <h2>📜 Review History</h2>
    <div id="history"></div>
</div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
