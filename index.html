<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Review Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="review-container">

        <!-- Dark Mode Button -->
        <button id="themeBtn" onclick="toggleTheme()">
            🌙 Dark Mode
        </button>

        <!-- Heading -->
        <h1>🤖 AI Code Review Assistant</h1>

        <p>
            Paste your code below and let AI analyze it for bugs,
            code quality, and improvement suggestions.
        </p>

        <!-- Language Selection -->
        <label><strong>Select Language</strong></label>

        <select>
            <option>JavaScript</option>
            <option>Python</option>
            <option>C</option>
            <option>C++</option>
            <option>Java</option>
            <option>HTML</option>
            <option>CSS</option>
        </select>

        <br><br>

        <!-- Code Editor -->
        <textarea
            rows="12"
            placeholder="Paste your code here..."></textarea>

        <br><br>

        <!-- Review Button -->
        <button id="reviewBtn" class="review-btn" onclick="reviewCode()">
            Review Code
        </button>

        <br><br>

        <!-- AI Review Result -->
        <section class="result-container">

            <h2>AI Review Result</h2>

            <div id="result">
                <p>Your AI feedback will appear here.</p>
            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
