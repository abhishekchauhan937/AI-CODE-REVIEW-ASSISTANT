<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Review Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

   <nav>
    <h2>AI Code Review Assistant</h2>

    <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">New Review</a></li>
        <li><a href="#">History</a></li>
        <li><a href="#">Profile</a></li>
    </ul>
</nav>

<section class="review-container">

    <h1>New AI Code Review</h1>

    <label>Programming Language</label>

    <select>
        <option>JavaScript</option>
        <option>Python</option>
        <option>C++</option>
        <option>Java</option>
        <option>C</option>
    </select>

    <label>Paste Your Code</label>

    <textarea placeholder="Paste your code here..."></textarea>

    <button class="review-btn"onclick="reviewCode()">
        Review Code
    </button>

</section>

<section class="result-container">

    <h2>AI Review Result</h2>

    <div class="result-card" id="result">

        Your AI feedback will appear here.

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
